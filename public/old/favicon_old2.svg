<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente Verde da Irlanda -->
    <linearGradient id="irish" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#169B62"/>
      <stop offset="40%" stop-color="#1EB870"/>
      <stop offset="70%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#FF883E"/>
    </linearGradient>
    <!-- Brilho no L -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo escuro -->
  <rect width="512" height="512" fill="#0c1424" rx="60"/>

  <!-- ====================== -->
  <!-- O PARRY (MASCOTE)      -->
  <!-- Saindo de atrás do L   -->
  <!-- ====================== -->
  <g transform="translate(60, 60)">

    <!-- PERNAS LARANJA (atrás do L, parcialmente visíveis) -->
    <rect x="118" y="310" width="18" height="60" rx="8" fill="#ea580c"/>
    <rect x="118" y="358" width="32" height="14" rx="6" fill="#ea580c"/>
    <rect x="152" y="310" width="18" height="60" rx="8" fill="#ea580c"/>
    <rect x="152" y="358" width="32" height="14" rx="6" fill="#ea580c"/>

    <!-- CORPO DO PARRY (slate, atrás/lado do L) -->
    <path d="M 80 290 C 76 310, 85 320, 100 322 L 195 322 C 210 322, 215 312, 213 295 L 205 220 C 203 210, 196 208, 190 212 C 160 226, 90 248, 80 290 Z" 
          fill="#475569" stroke="#cbd5e1" stroke-width="6" stroke-linejoin="round"/>

    <!-- SAIA ADMINISTRATIVA (terno cinza escuro) -->
    <path d="M 90 270 C 92 320, 195 322, 195 322 C 210 322, 215 312, 213 295 L 210 278 C 200 283, 120 283, 90 270 Z" 
          fill="#1e293b" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>

    <!-- Camisa branca interna -->
    <path d="M 190 212 L 158 250 L 213 235 Z" fill="#f8fafc"/>

    <!-- Gravata (gerente/admin) -->
    <polygon points="175,235 171,220 179,220" fill="#dc2626"/>
    <polygon points="175,235 169,258 181,258" fill="#dc2626"/>

    <!-- Botões dourados -->
    <circle cx="163" cy="272" r="5" fill="#fbbf24"/>
    <circle cx="151" cy="288" r="5" fill="#fbbf24"/>

    <!-- DETALHE NEON NO PESCOÇO -->
    <path d="M 182 225 L 208 218" stroke="#4ade80" stroke-width="10" stroke-linecap="round"/>
    <path d="M 165 243 L 212 232" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.8"/>

    <!-- CABEÇA -->
    <path d="M 195 212 L 198 164 C 200 148, 210 148, 222 152 L 240 162 C 248 166, 248 176, 242 182 L 195 212 Z" 
          fill="#334155" stroke="#cbd5e1" stroke-width="6" stroke-linejoin="round"/>

    <!-- BICO LARANJA -->
    <path d="M 238 168 L 272 176 C 280 178, 280 186, 272 188 L 236 182 Z" 
          fill="#f97316" stroke="#ea580c" stroke-width="4" stroke-linejoin="round"/>

    <!-- OLHO -->
    <path d="M 210 160 Q 216 156 222 160" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="216" cy="165" r="8" fill="#38bdf8"/>
    <circle cx="218" cy="164" r="3" fill="#0f172a"/>

    <!-- CHAPÉU DE GERENTE/ADMIN (hard hat executivo) -->
    <g transform="translate(196, 122) rotate(8)">
      <!-- Aba do chapéu -->
      <path d="M -8 18 Q 22 10 52 18" stroke="#0f172a" stroke-width="10" stroke-linecap="round" fill="none"/>
      <!-- Copa do chapéu -->
      <path d="M -2 16 L 4 -4 L 44 -4 L 50 16 Z" fill="#1e3a8a" stroke="#1e40af" stroke-width="4"/>
      <!-- Faixa dourada -->
      <rect x="0" y="10" width="48" height="6" fill="#fbbf24" rx="1"/>
      <!-- Estrela / emblema -->
      <polygon points="24,4 27,10 21,10" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
    </g>

    <!-- PASTA / PORTFÓLIO (acessório de gerente) -->
    <g transform="translate(220, 250) rotate(-10)">
      <rect x="0" y="0" width="52" height="70" rx="5" fill="#92400e" stroke="#78350f" stroke-width="3"/>
      <rect x="4" y="10" width="44" height="52" fill="#fef3c7" rx="2"/>
      <rect x="18" y="-6" width="16" height="10" rx="3" fill="#64748b" stroke="#475569" stroke-width="2"/>
      <!-- Linhas de documento -->
      <line x1="8" y1="20" x2="18" y2="20" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
      <line x1="22" y1="20" x2="44" y2="20" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="32" x2="18" y2="32" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
      <line x1="22" y1="32" x2="44" y2="32" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="44" x2="44" y2="44" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    </g>

  </g>

  <!-- ================================ -->
  <!-- O "L" COM GRADIENTE DA IRLANDA   -->
  <!-- Na frente do Parry (z acima)     -->
  <!-- ================================ -->
  <path 
    d="M 160 60 L 160 370 L 370 370 L 370 320 L 218 320 L 218 60 Z"
    fill="url(#irish)"
    filter="url(#glow)"
    opacity="0.97"
  />

  <!-- Brilho/highlight no L -->
  <path 
    d="M 165 65 L 165 200 L 175 200 L 175 75 Z"
    fill="white" opacity="0.18" rx="4"
  />

</svg>
